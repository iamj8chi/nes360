<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>No Estan Solos 360° VR | Zet Studios</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <script type="module" src="/src/main.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .hint {
        position: absolute;
        left: 8px;
        top: 8px;
        color: white;
        font-family: sans-serif;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 8px;
        border-radius: 4px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="hint">
      WASD / flechas para moverte. Haz click al cartel de Safari y busca los 6
      animales.
    </div>

    <!-- fog="type: exponential; color: #FFD178; density: 0.02"-->>

    <a-scene
      fog="type: exponential; color: #f5dca6; density: 0.02"
      background="color: #FFD178"
      renderer="antialias: true; 
                colorManagement: true; 
                sortObjects: true; 
                physicallyCorrectLights: false;
                powerPreference: high-performance;
                precision: mediump;
                logarithmicDepthBuffer: false"
      vr-mode-ui="enabled: true"
      inspector="url: https://cdn.jsdelivr.net/gh/aframevr/aframe-inspector@master/dist/aframe-inspector.min.js"
      shadow-control="enabled: false"
      audio-unlock
      collision-manager
    >
      <!-- Safari Game Manager -->
      <a-entity
        id="gameManager"
        safari-game-manager="timeLimit: 300"
      ></a-entity>

      <a-assets>
        <!-- Model assets -->
        <a-asset-item id="samuuModel" src="assets/samuu.glb"></a-asset-item>
        <a-asset-item
          id="samuuCanopyModel"
          src="assets/samuu-canopy.glb"
        ></a-asset-item>
        <a-asset-item
          id="jaguareteModel"
          src="assets/jaguarete.glb"
        ></a-asset-item>
        <a-asset-item id="nanduModel" src="assets/nandu.glb"></a-asset-item>
        <a-asset-item
          id="flamengoModel"
          src="assets/flamengo.glb"
        ></a-asset-item>
        <a-asset-item id="jurumiModel" src="assets/jurumi.glb"></a-asset-item>
        <a-asset-item id="taguaModel" src="assets/tagua.glb"></a-asset-item>
        <a-asset-item id="tatuModel" src="assets/tatu.glb"></a-asset-item>
        <a-asset-item
          id="scenarioModel"
          src="assets/scenario.glb"
        ></a-asset-item>
        <a-asset-item id="pastoModel" src="assets/pasto.glb"></a-asset-item>
        <a-asset-item
          id="karandayTroncoModel"
          src="assets/karanday-tronco.glb"
        ></a-asset-item>
        <a-asset-item
          id="karandayHojaModel"
          src="assets/karanday-hoja.glb"
        ></a-asset-item>

        <!-- UI assets for animal tracker -->
        <img id="trackerBg" src="assets/ui/tracker-background.png" />
        <img id="flamengoCheck" src="assets/ui/flamengo-check.png" />
        <img id="flamengoUncheck" src="assets/ui/flamengo-uncheck.png" />
        <img id="jaguareteCheck" src="assets/ui/jaguarete-check.png" />
        <img id="jaguareteUncheck" src="assets/ui/jaguarete-uncheck.png" />
        <img id="nanduCheck" src="assets/ui/nandu-check.png" />
        <img id="nanduUncheck" src="assets/ui/nandu-uncheck.png" />
        <img id="jurumiCheck" src="assets/ui/jurumi-check.png" />
        <img id="jurumiUncheck" src="assets/ui/jurumi-uncheck.png" />
        <img id="taguaCheck" src="assets/ui/tagua-check.png" />
        <img id="taguaUncheck" src="assets/ui/tagua-uncheck.png" />
        <img id="tatuCheck" src="assets/ui/tatu-check.png" />
        <img id="tatuUncheck" src="assets/ui/tatu-uncheck.png" />

        <!-- Cartel images -->
        <img id="cartelSafari" src="assets/img/cartel-safari.png" />
        <img id="cartelVuelo" src="assets/img/cartel-vuelo.png" />
        <img id="cartelMain" src="assets/img/cartel-main.png" />

        <!-- Audio assets -->
        <audio
          id="ambienceSound"
          src="assets/sfx/ambience.mp3"
          preload="auto"
        ></audio>
        <audio id="tatuSound" src="assets/sfx/tatu.mp3" preload="auto"></audio>
        <audio
          id="flamengoSound"
          src="assets/sfx/flamengo.mp3"
          preload="auto"
        ></audio>
        <audio
          id="jaguareteSound"
          src="assets/sfx/jaguarete.mp3"
          preload="auto"
        ></audio>

        <!-- Game sound effects -->
        <audio
          id="gameStartSound"
          src="assets/sfx/game-start.mp3"
          preload="auto"
        ></audio>
        <audio
          id="gameFoundSound"
          src="assets/sfx/game-found.mp3"
          preload="auto"
        ></audio>
        <audio
          id="gameWinSound"
          src="assets/sfx/game-win.mp3"
          preload="auto"
        ></audio>
        <audio
          id="gameOverSound"
          src="assets/sfx/game-over.mp3"
          preload="auto"
        ></audio>
      </a-assets>

      <!-- Sky -->
      <a-sky color="#87ceeb"></a-sky>

      <!-- Ambient Sound - plays everywhere in the background -->
      <a-entity
        id="ambientSound"
        sound="src: #ambienceSound; autoplay: true; loop: true; volume: 0.3; positional: false"
        position="0 0 0"
      ></a-entity>

      <!-- Game Sound Effects (triggered by events) -->
      <a-entity id="gameSoundEffects" position="0 0 0">
        <a-entity
          id="soundGameStart"
          sound="src: #gameStartSound; autoplay: false; volume: 0.6; positional: false"
        ></a-entity>
        <a-entity
          id="soundGameFound"
          sound="src: #gameFoundSound; autoplay: false; volume: 0.5; positional: false"
        ></a-entity>
        <a-entity
          id="soundGameWin"
          sound="src: #gameWinSound; autoplay: false; volume: 0.7; positional: false"
        ></a-entity>
        <a-entity
          id="soundGameOver"
          sound="src: #gameOverSound; autoplay: false; volume: 0.6; positional: false"
        ></a-entity>
      </a-entity>

      <!-- Lighting: hemisphere ambient + directional sun (shadows enabled in script) -->
      <a-entity
        light="type: hemisphere; color: #ffffff; groundColor: #556655; intensity: 0.8"
      ></a-entity>

      <a-entity
        id="sun"
        light="type: directional; color: #ffffff; intensity: 1.3; castShadow: true"
        position="0 50 0"
        rotation="0 0 0"
      ></a-entity>

      <!-- Ocean using a-ocean component 
      <a-ocean
        width="500"
        depth="500"
        density="20"
        opacity="1"
        position="30 -0.5 -10"
        color="#16e9aa"
      ></a-ocean> -->

      <!-- Ground (slightly raised) 
      <a-entity
        geometry="primitive: circle; radius: 50; segments: 32"
        material="color: #96d165"
        shadow="receive: true"
        rotation="-90 0 0"
        position="0 0.01 0"
      ></a-entity> -->

      <!-- Player Collision Boundary Ring -->
      <a-entity
        id="boundaryRing"
        visible="false"
        geometry="primitive: cylinder; radius: 60; height: 10; openEnded: true; thetaStart: 0; thetaLength: 500"
        material="color: #0066ff; transparent: true; opacity: 0.2; side: double"
        position="0 5 0"
        static-body
      ></a-entity>

      <!-- Safari Game Control Orbs -->
      <a-entity id="carteles" position="0 1.5 -5">
        <!-- Safari Cartel -->
        <a-entity
          id="startCartel"
          shadow="receive: false"
          position="-4.5 0 0"
          collision-cube="width: 1; depth: 0.3; height: 10; offsetY: 0"
        >
          <a-image
            id="startCartelImg"
            class="clickable orb-start"
            src="#cartelSafari"
            position="0 0 0"
            width="1"
            height="1.4"
            shadow="cast: true"
            material="shader: flat; transparent: true"
            orb-controller
          ></a-image>
          <a-box
            position="0 -1 -0.15"
            scale="0.2 3 0.2"
            color="#a85432"
          ></a-box>
          <a-box
            position="0 0 -0.03"
            scale="0.9 1.3 0.05"
            color="#a85432"
          ></a-box>
        </a-entity>

        <!-- Flight Cartel -->
        <a-entity
          id="vueloCartel"
          shadow="receive: false"
          class="clickable orb-minigame"
          position="4.5 0 0"
          collision-cube="width: 1; depth: 0.3; height: 10; offsetY: 0"
        >
          <a-image
            id="minigameOrb"
            class="clickable orb-minigame"
            src="#cartelVuelo"
            position="0 0 0"
            width="1"
            height="1.4"
            shadow="cast: true"
          ></a-image>
          <a-box
            position="0 -1 -0.15"
            scale="0.2 3 0.2"
            color="#a85432"
          ></a-box>
          <a-box
            position="0 0 -0.03"
            scale="0.9 1.3 0.05"
            color="#a85432"
          ></a-box>
        </a-entity>
      </a-entity>

      <!-- Main Cartel -->

      <a-entity
        id="mainCartelGrande"
        position="0 0 -5"
        collision-cube="width: 7; depth: 0.3; height: 16 offsetY: -10"
      >
        <a-image
          id="mainCartel"
          geometry="width: 7"
          src="#cartelMain"
          position="0 3 0"
          width="7"
          height="4"
          shadow="cast: true"
        ></a-image>
        <a-box
          position="0 3 -0.03"
          scale="6.5 3.5 0.05"
          color="#a85432"
        ></a-box>
        <a-box position="2 1 -0.15" scale="0.2 3 0.2" color="#a85432"></a-box
        ><a-box position="-2 1 -0.15" scale="0.2 3 0.2" color="#a85432"></a-box
      ></a-entity>

      <!-- Scenario Model -->
      <a-entity
        id="scenario"
        gltf-model="#scenarioModel"
        position="0 0.01304 0"
        rotation="0 180 0"
        scale="10 10 10"
        shadow="receive: true; cast: false"
      ></a-entity>

      <!-- New showcase models / Safari Game Animals -->
      <a-entity
        id="flamengo"
        class="clickable animal"
        data-animal-type="flamingo"
        gltf-model="#flamengoModel"
        position="-12.12801 0 -32.65917"
        rotation="0 195.6 0"
        scale="2 2 2"
        animation-mixer="clip: idle"
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
        sound="src: #flamengoSound; autoplay: true; loop: true; volume: 0.8; positional: true; refDistance: 5; maxDistance: 30; rolloffFactor: 1"
      ></a-entity>
      <a-entity
        id="jaguarete"
        class="clickable animal"
        data-animal-type="jaguarete"
        gltf-model="#jaguareteModel"
        position="-13.62112 0 23.39443"
        rotation="0 -45 0"
        scale="2 2 2"
        animation-mixer
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
        sound="src: #jaguareteSound; autoplay: true; loop: true; volume: 0.8; positional: true; refDistance: 5; maxDistance: 30; rolloffFactor: 1"
      ></a-entity>
      <a-entity
        id="nandu"
        class="clickable animal"
        data-animal-type="nandu"
        gltf-model="#nanduModel"
        position="22.16629 0 -1.51447"
        rotation="0 163 0"
        scale="2 2 2"
        animation-mixer
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
      ></a-entity>
      <a-entity
        id="jurumi"
        class="clickable animal"
        data-animal-type="jurumi"
        gltf-model="#jurumiModel"
        position="-28.34973 0 1.64968"
        rotation="0 208.28 0"
        scale="2 2 2"
        animation-mixer
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
      ></a-entity>
      <a-entity
        id="tagua"
        class="clickable animal"
        data-animal-type="tagua"
        gltf-model="#taguaModel"
        position="5.98673 0 18.53104"
        rotation="0 45 0"
        scale="2 2 2"
        animation-mixer
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
      ></a-entity>
      <a-entity
        id="tatu"
        class="clickable animal"
        data-animal-type="tatu"
        gltf-model="#tatuModel"
        position="14.60573 0 -13.67693"
        rotation="0 149.7 0"
        scale="2 2 2"
        animation-mixer
        staggered-start="maxOffset: 1.6"
        performance-optimizer="nearDistance: 15; midDistance: 30; farDistance: 50"
        material-optimizer
        animal-clickable
        sound="src: #tatuSound; autoplay: true; loop: true; volume: 0.8; positional: true; refDistance: 5; maxDistance: 30; rolloffFactor: 1"
      ></a-entity>

      <!-- Camera rig with WASD and VR controls -->
      <a-entity
        id="cameraRig"
        position="0 0 0"
        movement-controls="enabled: true; speed: 0.2;"
        vr-locomotion="controllerHand: left"
        boundary-collision="radius: 60"
        collision-responder="padding: 0.3"
        screen-fade="fadeDuration: 1000"
        progress-ui
      >
        <!-- Camera -->
        <a-entity
          id="head"
          camera
          look-controls="pointerLockEnabled: false"
          position="0 1.6 0"
          wasd-controls="enabled: false"
          raycaster="objects: .clickable, .animal; far: 20"
          cursor="fuse: false; rayOrigin: mouse"
        >
          <!-- Tracker UI Container - attached to camera at waist height -->
          <a-entity
            id="trackerUI"
            position="0 -0.53233 -1.2"
            rotation="-15 0 0"
            visible="false"
          >
            <!-- Background Tracker -->
            <a-plane
              id="trackerBackground"
              src="#trackerBg"
              width="0.4"
              height="0.48"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Animal Icon Slots (positioned on the tracker) -->
            <!-- Flamingo - Top Left -->
            <a-plane
              id="flamengoIcon"
              src="#flamengoUncheck"
              width="0.09"
              height="0.09"
              position="-0.09 0.15 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Jaguarete - Top Right -->
            <a-plane
              id="jaguareteIcon"
              src="#jaguareteUncheck"
              width="0.09"
              height="0.09"
              position="0.09 0.15 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Nandu - Middle Left -->
            <a-plane
              id="nanduIcon"
              src="#nanduUncheck"
              width="0.09"
              height="0.09"
              position="-0.09 0.03 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Jurumi - Middle Right -->
            <a-plane
              id="jurumiIcon"
              src="#jurumiUncheck"
              width="0.09"
              height="0.09"
              position="0.09 0.03 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Tagua - Bottom Left -->
            <a-plane
              id="taguaIcon"
              src="#taguaUncheck"
              width="0.09"
              height="0.09"
              position="-0.09 -0.09 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Tatu - Bottom Right -->
            <a-plane
              id="tatuIcon"
              src="#tatuUncheck"
              width="0.09"
              height="0.09"
              position="0.09 -0.09 0.001"
              material="shader: flat; transparent: true"
            ></a-plane>

            <!-- Timer Display Area -->
            <a-text
              id="timerDisplay"
              value="5:00"
              align="center"
              position="0 -0.19 0.001"
              scale="0.3 0.3 0.3"
              color="#FFFFFF"
              shader="msdf"
              font="https://cdn.aframe.io/fonts/Roboto-msdf.json"
            ></a-text>
          </a-entity>
        </a-entity>

        <!-- Left Controller -->
        <a-entity
          id="leftHand"
          hand-controls="hand: left; handModelStyle: lowPoly; color: #ffccaa"
          raycaster="objects: .clickable, .animal; far: 20; direction: 0 -0.707 -0.707; showLine: true"
          line="color: #00FF00; opacity: 0.75"
          cursor="fuse: false; rayOrigin: entity"
          animal-highlighter
        >
        </a-entity>

        <!-- Right Controller - Point and click controller -->
        <a-entity
          id="rightHand"
          hand-controls="hand: right; handModelStyle: lowPoly; color: #ffccaa"
          raycaster="objects: .clickable, .animal; far: 20; direction: 0 -0.707 -0.707; showLine: true"
          line="color: #FF0000; opacity: 0.75"
          cursor="fuse: false; rayOrigin: entity"
          animal-highlighter
        >
        </a-entity>
      </a-entity>

      <a-entity id="trees">
        <!-- Outer circle of larger trees -->
